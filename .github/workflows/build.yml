name: Build Desktop Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
            package_cmd: wails build -platform linux/amd64
            artifact_name: ticktoken-linux-amd64
          - os: macos-latest
            platform: darwin/universal
            package_cmd: wails build -platform darwin/universal
            artifact_name: ticktoken-macos
          - os: windows-latest
            platform: windows/amd64
            package_cmd: wails build -platform windows/amd64 -nsis
            artifact_name: ticktoken-windows-amd64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0

      - name: Add Wails to PATH
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config
          sudo ln -sf /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.1.pc /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.0.pc

      - name: Setup macOS toolchain
        if: runner.os == 'macOS'
        run: |
          sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer
          echo "SDKROOT=$(xcrun --show-sdk-path)" >> $GITHUB_ENV
          echo "/usr/sbin" >> $GITHUB_PATH

      - name: Build
        run: ${{ matrix.package_cmd }}

      - name: Package macOS app
        if: runner.os == 'macOS'
        run: |
          cd build/bin
          ditto -c -k --keepParent TickToken.app TickToken-macOS-universal.zip
          rm -rf TickToken.app

      - name: Package Linux binary
        if: runner.os == 'Linux'
        run: |
          cd build/bin
          tar czf TickToken-linux-amd64.tar.gz TickToken
          rm TickToken

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/bin/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: TickToken ${{ github.ref_name }}
          generate_release_notes: false
          body: |
            ## TickToken ${{ github.ref_name }}

            被动式 Token 计数器 - 基于 MITM 代理的 Token 用量追踪工具。

            ### 下载安装
            - **Linux**: 下载 `TickToken-linux-amd64.tar.gz`，解压后运行 `./TickToken`
            - **macOS**: 下载 `TickToken-macOS-universal.zip`，解压后拖入 Applications
            - **Windows**: 下载 `TickToken-amd64-installer.exe`，双击安装

            ### 系统要求
            - Linux: libwebkit2gtk-4.1, libgtk-3
            - macOS: macOS 11+
            - Windows: Windows 10+
          files: |
            artifacts/ticktoken-linux-amd64/*
            artifacts/ticktoken-macos/*
            artifacts/ticktoken-windows-amd64/*
