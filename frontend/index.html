<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TickToken</title>
<link rel="stylesheet" href="/src/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="header">
  <div class="header-left">
    <h1>TickToken</h1>
    <span class="mode-badge" id="modeBadge">Loading...</span>
  </div>
  <div class="header-right">
    <span class="proxy-info" id="proxyInfo">-</span>
    <button class="header-btn" onclick="openCACert()">CA 证书</button>
    <button class="header-btn" onclick="openDataDir()">数据目录</button>
  </div>
</div>

<div class="container">
  <div class="summary">
    <div class="card">
      <div class="label">Prompt Tokens</div>
      <div class="value blue" id="totalPrompt">0</div>
    </div>
    <div class="card">
      <div class="label">Completion Tokens</div>
      <div class="value green" id="totalCompletion">0</div>
    </div>
    <div class="card">
      <div class="label">Cache Hit</div>
      <div class="value yellow" id="totalCacheHit">0</div>
    </div>
    <div class="card">
      <div class="label">Total Events</div>
      <div class="value purple" id="totalEvents">0</div>
    </div>
  </div>

  <div class="section">
    <h2>时间序列</h2>
    <div class="controls">
      <select id="timeRange">
        <option value="1">1 hour</option>
        <option value="6">6 hours</option>
        <option value="24" selected>24 hours</option>
        <option value="168">7 days</option>
      </select>
      <button class="ctrl-btn" onclick="refreshAll()">Refresh</button>
    </div>
    <div class="chart-container"><canvas id="timelineChart"></canvas></div>
  </div>

  <div class="section">
    <h2>分类聚合</h2>
    <div class="controls">
      <button class="ctrl-btn active" id="btn-model" onclick="setDimension('model')">By Model</button>
      <button class="ctrl-btn" id="btn-tool" onclick="setDimension('tool')">By Tool</button>
    </div>
    <div class="chart-container"><canvas id="aggregateChart"></canvas></div>
  </div>

  <div class="section">
    <h2>实时事件</h2>
    <div class="live-events" id="liveEvents">
      <div class="empty">等待事件...</div>
    </div>
  </div>
</div>

<script src="/src/main.js"></script>
</body>
</html>
